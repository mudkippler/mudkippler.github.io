<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Bullet Hell 60FPS</title>
    <style>
        canvas {
            background: #111;
            display: block;
            margin: auto;
        }
        #hud {
            width: 800px;
            margin: 10px auto;
            font-family: 'Courier New', Courier, monospace;
            color: white;
            background: #222;
            padding: 10px;
            border: 1px solid #444;
        }
        #death-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            text-align: center;
            padding-top: 25%;
        }
    #diagnostics {
            width: 800px;
            margin: 10px auto;
            font-family: 'Courier New', Courier, monospace;
            color: #aaa;
            background: #222;
            padding: 10px;
            border: 1px solid #444;
        }
        #victory-banner {
            display: none;
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 100, 20, 0.9);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.5rem;
            padding: 12px 24px;
            border: 2px solid #4f4;
            border-radius: 6px;
            pointer-events: none;
        }
        #chat {
            width: 800px;
            margin: 10px auto;
            font-family: 'Courier New', Courier, monospace;
            color: white;
            background: #222;
            border: 1px solid #444;
        }
        #chat-messages {
            height: 120px;
            overflow-y: auto;
            padding: 8px;
        }
        #chat-messages div {
            margin-bottom: 2px;
            word-wrap: break-word;
        }
        #chat-input {
            width: 100%;
            box-sizing: border-box;
            background: #111;
            color: white;
            border: none;
            border-top: 1px solid #444;
            padding: 8px;
            font-family: inherit;
            font-size: inherit;
        }
    </style>
</head>

<body>
    <canvas id="game" width="800" height="600"></canvas>
    <div id="victory-banner">Boss Defeated! Victory!</div>
    <div id="hud"></div>
    <div id="diagnostics"></div>
    <div id="chat">
        <div id="chat-messages"></div>
        <input id="chat-input" type="text" placeholder="Press Enter to chat..." maxlength="200" />
    </div>
    <div id="death-screen">
        <h1>You died!</h1>
        <p>Respawning in <span id="respawn-countdown"></span>s...</p>
    </div>
    <script src="./libs/msgpack.min.js"></script>
    <script type="module" src="client.js"></script>
</body>

</html>
